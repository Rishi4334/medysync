version: "3.9"
services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: medisync-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log

volumes:
  mqtt-data:
  mqtt-log:
